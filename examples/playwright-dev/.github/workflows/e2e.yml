# Generated by reviewqa. Sample CI workflow for the e2e suite at
# `tests/e2e/`. Edit freely — reviewqa never overwrites this file on
# subsequent probes.
#
# What it does:
#   1. Installs Node.js dependencies (npm ci if a lockfile exists, otherwise npm install).
#   2. Installs the Chromium browser using npx playwright install.
#   3. Runs the full test suite against the baseURL configured in
#      `playwright.config.ts` (the origin reviewqa probed).
#   4. Uploads the HTML report and traces as workflow artifacts for failure debugging
#      are using the Playwright trace viewer.
#
# To run against staging, a PR preview, or localhost, add a BASE_URL
# repository secret and uncomment the env: BASE_URL: block below.
#
# To test across browsers, uncomment firefox or webkit in
# the playwright.config.ts projects section.

name: e2e

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # env:
    #   BASE_URL: REPLACE_WITH_GH_SECRET   # use ${{ secrets.BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=html,list
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: Upload traces if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14

