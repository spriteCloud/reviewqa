name: probe-demo

# Dedicated workflow that demonstrates quail's proactive probe mode
# against a live URL. Fires only on the demo branch or via manual
# workflow_dispatch so it does not interfere with regular PR runs.

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/probe-demo.yml'
      - 'README.md'  # demo branches typically just touch README
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      url:
        description: URL to probe (any reachable http(s) endpoint)
        required: true
        default: https://www.spritecloud.com
      pr:
        description: Optional PR number to attach the generated spec to (leave empty for a standalone PR against main)
        required: false
        default: ''
      kinds:
        description: 'Comma-list of test kinds to emit (e.g. a11y, perf, journey,a11y). Empty = all.'
        required: false
        default: ''
      exclude-kinds:
        description: 'Comma-list of kinds to drop (e.g. mobile,integration,touch,race).'
        required: false
        default: ''
      dom-snapshots:
        description: Commit raw tests/e2e/_dom/*.html browser-render dumps.
        required: false
        type: boolean
        default: false
      a11y-uncap:
        description: Emit a11y trio on every crawled page (default caps it).
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  probe:
    # Run on the dedicated demo branch OR on any workflow_dispatch invocation.
    if: github.head_ref == 'demo/probe-spritecloud-com' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bring the runner onto spriteCloud's Netbird mesh so it can reach
      # the DGX-hosted Ollama at 100.82.34.115:11434. Same action +
      # pinned SHA as quail-e2e-demo.
      - name: Connect to Netbird
        uses: Alemiz112/netbird-connect@b2bea073dea42968276f717128c57e739dd514f3
        with:
          setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          management-url: ${{ secrets.NETBIRD_MANAGEMENT_URL }}
          hostname: gh-quail-probe-demo-${{ github.run_id }}

      - name: Reach DGX through Netbird
        run: |
          set -u
          for i in $(seq 1 30); do
            if curl -fsS -m 3 http://100.82.34.115:11434/api/version >/dev/null 2>&1; then
              echo "DGX reachable after ${i} attempt(s)." && exit 0
            fi
            sleep 2
          done
          echo "::error::DGX unreachable after 60s." && exit 1

      - uses: ./
        with:
          pr: ${{ github.event.inputs.pr || github.event.pull_request.number }}
          openai-base-url: http://100.82.34.115:11434/v1
          openai-api-key: ollama
          model: qwen3-coder-next:latest
          quail-llm: http://100.82.34.115:11434
          heal-mode: 'off'
          log-level: info
          target-urls: ${{ github.event.inputs.url || 'https://www.spritecloud.com' }}
          kinds: ${{ github.event.inputs.kinds }}
          exclude-kinds: ${{ github.event.inputs.exclude-kinds }}
          dom-snapshots: ${{ github.event.inputs.dom-snapshots }}
          a11y-uncap: ${{ github.event.inputs.a11y-uncap }}
