name: quail

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to run against
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  quail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: spriteCloud/quail-review@v1
        with:
          pr: ${{ github.event.inputs.pr || github.event.pull_request.number }}
          openai-base-url: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ vars.QUAIL_MODEL || 'gpt-4o-mini' }}
          heal-mode: on-failure
          playwright-report: playwright-report.json
          log-level: info
