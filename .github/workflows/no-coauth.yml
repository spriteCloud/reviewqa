name: no-coauth

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Refuse Co-Authored-By trailers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ] && [ "$BASE_SHA" != "$HEAD_SHA" ]; then
            range="$BASE_SHA..$HEAD_SHA"
          else
            range="HEAD~1..HEAD"
          fi
          echo "Scanning commits in range: $range"
          # Print any commit that has a Co-Authored-By trailer. The grep
          # exits non-zero with no matches; capture explicitly.
          offenders=$(git log "$range" --pretty=format:'%H%n%B%n---END---' \
                       | grep -i -B 1000 -E '^[[:space:]]*Co-?Authored-?By:' \
                       || true)
          if [ -n "$offenders" ]; then
            echo "::error::A commit contains a Co-Authored-By trailer. This repository forbids them."
            echo ""
            echo "Offending commits / trailers:"
            git log "$range" --pretty=format:'%H %s' | while read sha subject; do
              body=$(git log -1 --pretty=%B "$sha")
              if echo "$body" | grep -i -E '^[[:space:]]*Co-?Authored-?By:' > /dev/null; then
                echo "  $sha  $subject"
                echo "$body" | grep -i -E '^[[:space:]]*Co-?Authored-?By:' | sed 's/^/    /'
              fi
            done
            exit 1
          fi
          echo "OK — no Co-Authored-By trailers in the scanned range."
