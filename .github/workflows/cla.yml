name: cla

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN must be a PAT (classic, `repo` scope) for a
          # separate "signatures" repo. Add it under repo Settings → Secrets.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: signatures/v1/cla.json
          path-to-document: https://github.com/spriteCloud/quail/blob/main/CLA.md
          branch: main
          # Storage repo: create a private repo `spriteCloud/cla-signatures`
          # and the action writes signed contributors there as JSON.
          remote-organization-name: spriteCloud
          remote-repository-name: cla-signatures
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge, we need you to sign the [Contributor License Agreement](https://github.com/spriteCloud/quail/blob/main/CLA.md).
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
          allowlist: dependabot[bot],github-actions[bot]
