name: reviewqa

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to run against
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  reviewqa:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      REVIEWQA_MODEL: ${{ vars.REVIEWQA_MODEL || 'gpt-4o-mini' }}
      REVIEWQA_PR: ${{ github.event.inputs.pr || github.event.pull_request.number }}
      REVIEWQA_HEAL_MODE: on-failure
      REVIEWQA_PLAYWRIGHT_REPORT: playwright-report.json
      REVIEWQA_LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build reviewqa
        run: go build -o "$RUNNER_TEMP/reviewqa" ./cmd/reviewqa

      - name: reviewqa generate
        run: "$RUNNER_TEMP/reviewqa" generate

      - name: reviewqa heal
        if: hashFiles('playwright-report.json') != ''
        run: "$RUNNER_TEMP/reviewqa" heal
