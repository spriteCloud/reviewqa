name: runtime-smoke

# Probes each reference site, generates the full project (specs +
# package.json + tsconfig + config + fixtures + README + CI workflow),
# runs `npm install` and `npx playwright test` against the live site,
# and emits the pass/fail counts as a GitHub job summary.
#
# This is the ONLY workflow that asserts the generated specs actually
# RUN at runtime. verify-references only checks the generation side.
# Diagnostic — not gating.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch / tag to build reviewqa from
        required: false
        default: main

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        site:
          - { name: playwright-dev,            url: "https://playwright.dev" }
          - { name: gohugo-io,                 url: "https://gohugo.io" }
          - { name: books-toscrape-com,        url: "https://books.toscrape.com" }
          - { name: es-wikipedia-org-madrid,   url: "https://es.wikipedia.org/wiki/Madrid" }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'main' }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build reviewqa
        run: go build -o ./bin/reviewqa ./cmd/reviewqa

      - name: Generate suite into staging dir
        run: |
          mkdir -p /tmp/suite/${{ matrix.site.name }}
          cd /tmp/suite/${{ matrix.site.name }}
          $GITHUB_WORKSPACE/bin/reviewqa probe --url "${{ matrix.site.url }}" --dry-run > probe-output.log 2>&1
          python3 - <<'EOF'
          import re, os
          with open('probe-output.log') as f:
              data = f.read()
          parts = re.split(r'^--- ([^\s]+) ---$', data, flags=re.MULTILINE)
          for i in range(1, len(parts), 2):
              rel = parts[i]
              body = parts[i+1].lstrip('\n').rstrip() + '\n'
              os.makedirs(os.path.dirname(rel) or '.', exist_ok=True)
              with open(rel, 'w') as out:
                  out.write(body)
          print('wrote', (len(parts)-1)//2, 'files')
          EOF

      - name: Install dependencies
        working-directory: /tmp/suite/${{ matrix.site.name }}
        run: |
          npm install --no-audit --no-fund --silent
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: pw
        working-directory: /tmp/suite/${{ matrix.site.name }}
        continue-on-error: true
        run: npx playwright test --reporter=json > pw-report.json 2> pw-stderr.log || true

      - name: Emit fitness summary
        working-directory: /tmp/suite/${{ matrix.site.name }}
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          import json, sys
          try:
              with open('pw-report.json') as f:
                  data = json.load(f)
          except Exception as e:
              print(f"## site: ${{ matrix.site.name }}\n\n_pw-report.json missing or unparseable ({e})_\n")
              sys.exit(0)
          stats = data.get('stats', {})
          expected = stats.get('expected', 0)
          unexpected = stats.get('unexpected', 0)
          flaky = stats.get('flaky', 0)
          skipped = stats.get('skipped', 0)
          passed = max(expected - unexpected, 0)
          print(f"## site: ${{ matrix.site.name }}\n")
          print("| Specs run | Passed | Failed | Flaky | Skipped |")
          print("|---|---|---|---|---|")
          print(f"| {expected} | {passed} | {unexpected} | {flaky} | {skipped} |\n")
          print("<details><summary>Failed test names</summary>\n")
          for suite in data.get('suites', []):
              for spec_file in suite.get('suites', []):
                  for s in spec_file.get('specs', []):
                      for t in s.get('tests', []):
                          if t.get('status') == 'unexpected':
                              print(f"- `{s.get('title','')}`")
          print("\n</details>\n")
          EOF

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pw-${{ matrix.site.name }}
          path: |
            /tmp/suite/${{ matrix.site.name }}/playwright-report
            /tmp/suite/${{ matrix.site.name }}/test-results
            /tmp/suite/${{ matrix.site.name }}/pw-report.json
            /tmp/suite/${{ matrix.site.name }}/pw-stderr.log
          retention-days: 14
