<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>quail · local viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <span class="wm"><span class="s">sprite</span><span class="c">Cloud</span></span>
      <span class="divider"></span>
      <span class="topbar-product">quail<span class="accent">/serve</span></span>
    </div>
    <div class="topbar-right">
      <span class="brand-project project-pill" data-project-name data-project-trigger title="Click to switch project">…</span>
      <span class="brand-badge" data-brand-badge>local</span>
    </div>
  </header>

  <div class="pixel-rail" aria-hidden="true">
    <span class="pr-1"></span><span class="pr-2"></span><span class="pr-3"></span>
    <span class="pr-4"></span><span class="pr-5"></span><span class="pr-6"></span>
    <span class="pr-7"></span><span class="pr-8"></span><span class="pr-9"></span>
    <span class="pr-10"></span><span class="pr-11"></span><span class="pr-12"></span>
    <span class="pr-13"></span><span class="pr-14"></span><span class="pr-15"></span>
  </div>

  <main class="layout">
    <aside class="sidebar">
      <ul class="nav-list" data-home-list>
        <li class="nav-item" data-home onclick="window.__openHome && window.__openHome()">
          <div>Home</div>
        </li>
        <li class="nav-item" data-settings onclick="window.__openSettings && window.__openSettings()">
          <div>Settings</div>
        </li>
      </ul>
      <h2 class="sidebar-heading">Features</h2>
      <ol class="feature-list" data-feature-list>
        <li class="empty">Loading…</li>
      </ol>
      <h2 class="sidebar-heading" data-specs-heading hidden>Tests</h2>
      <ul class="feature-list" data-spec-list></ul>
      <h2 class="sidebar-heading">Docs</h2>
      <ul class="doc-list" data-doc-list>
        <li class="empty">—</li>
      </ul>
    </aside>

    <section class="content" data-content>
      <div class="placeholder">
        <h1>Loading…</h1>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
