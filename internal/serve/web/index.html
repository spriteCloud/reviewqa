<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>reviewqa · local viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">reviewqa</span>
      <span class="brand-divider">·</span>
      <span class="brand-by">by spriteCloud</span>
      <span class="brand-divider">·</span>
      <span class="brand-project" data-project-name>…</span>
    </div>
    <div class="topbar-right">
      <span class="brand-badge">read-only viewer</span>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <h2 class="sidebar-heading">Features</h2>
      <ol class="feature-list" data-feature-list>
        <li class="empty">Loading…</li>
      </ol>
      <h2 class="sidebar-heading">Docs</h2>
      <ul class="doc-list" data-doc-list>
        <li class="empty">—</li>
      </ul>
    </aside>

    <section class="content" data-content>
      <div class="placeholder">
        <h1>Pick a feature</h1>
        <p>Open any <code>.feature</code> file from the sidebar to see its
          Scenarios, tags, and Steps rendered in brand styling. Or open a
          stakeholder doc — Catalogue, Summary, Findings — under Docs.</p>
      </div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
