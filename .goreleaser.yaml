version: 2

project_name: quail

before:
  hooks:
    - go mod tidy

builds:
  - id: quail
    main: ./cmd/quail
    binary: quail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # quail: Windows arm64 demand is low; revisit if asked. The
      # other Windows arch (amd64) builds cleanly via the build-tag
      # split in internal/probe/browser/flock_{unix,windows}.go.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: quail
    name_template: "quail_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      # Windows double-click launcher: starts `quail serve` and opens
      # the default browser at http://127.0.0.1:8765/. Harmless ride-
      # along on Unix archives.
      - src: scripts/quail-serve.bat
        dst: quail-serve.bat

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: spriteCloud
    name: quail
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
