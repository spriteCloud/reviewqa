version: 2

project_name: quail

before:
  hooks:
    - go mod tidy

builds:
  - id: quail
    main: ./cmd/quail
    binary: quail
    env:
      - CGO_ENABLED=0
    # ponytail: Windows skipped — internal/probe/browser/runner.go uses
    # syscall.Flock (Unix-only). Quail targets Linux/macOS CI + dev; if
    # Windows is ever in scope, port the lock helper behind a build tag.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: quail
    name_template: "quail_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: spriteCloud
    name: quail
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
